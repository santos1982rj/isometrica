services:
  backend:
    build: .
    ports:
      - "3001:3001"
    environment:
      - DATABASE_URL=file:./prisma/dev.db
      - JWT_SECRET=isometrica-secret-2026
      - NODE_ENV=development
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    volumes:
      - ./backend/prisma:/app/prisma
    restart: unless-stopped