<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 340" font-family="Inter, DM Sans, sans-serif">
  <defs>
    <marker id="arr-r" markerWidth="6" markerHeight="8" refX="3" refY="4" orient="auto">
      <path d="M0,0 L6,4 L0,8 Z" fill="#e85d32"/>
    </marker>
    <marker id="arr-l" markerWidth="6" markerHeight="8" refX="3" refY="4" orient="auto">
      <path d="M6,0 L0,4 L6,8 Z" fill="#e85d32"/>
    </marker>
    <marker id="arr-d" markerWidth="8" markerHeight="6" refX="4" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#e85d32"/>
    </marker>
    <marker id="arr-u" markerWidth="8" markerHeight="6" refX="4" refY="3" orient="auto">
      <path d="M0,6 L8,3 L0,0 Z" fill="#e85d32"/>
    </marker>
    <marker id="mom-cw" markerWidth="6" markerHeight="6" refX="3" refY="3" orient="auto">
      <path d="M0,0 L6,0 L3,6 Z" fill="#e85d32"/>
    </marker>
  </defs>

  <rect width="800" height="340" fill="#fafafa" rx="12"/>

  <text x="400" y="30" text-anchor="middle" font-size="16" font-weight="700" fill="#1a2e3c">Tipos de Apoio — Vínculos</text>
  <text x="400" y="46" text-anchor="middle" font-size="10" fill="#94a3b8">Graus de liberdade impedidos × Reações</text>

  <!-- ============ APOIO FIXO ============ -->
  <g transform="translate(40, 60)">
    <rect x="0" y="0" width="200" height="280" rx="8" fill="none" stroke="#e2e8f0" stroke-width="1.5"/>

    <text x="100" y="22" text-anchor="middle" font-size="13" font-weight="700" fill="#1a2e3c">Apoio Fixo</text>
    <text x="100" y="36" text-anchor="middle" font-size="9" fill="#94a3b8">2° G.L. / 2 reações</text>

    <!-- Viga -->
    <line x1="20" y1="80" x2="180" y2="80" stroke="#1a2e3c" stroke-width="4"/>

    <!-- Triângulo do apoio -->
    <polygon points="100,80 75,130 125,130" fill="#1a2e3c"/>
    <line x1="75" y1="130" x2="125" y2="130" stroke="#1a2e3c" stroke-width="3"/>
    <line x1="72" y1="136" x2="128" y2="136" stroke="#1a2e3c" stroke-width="1"/>
    <line x1="74" y1="142" x2="126" y2="142" stroke="#1a2e3c" stroke-width="1"/>
    <line x1="76" y1="148" x2="124" y2="148" stroke="#1a2e3c" stroke-width="1"/>

    <!-- Reações -->
    <line x1="100" y1="130" x2="100" y2="198" stroke="#e85d32" stroke-width="1.8" marker-end="url(#arr-u)"/>
    <text x="112" y="178" font-size="10" fill="#e85d32" font-weight="600">V</text>

    <line x1="10" y1="80" x2="10" y2="80" stroke="#e85d32" stroke-width="1.8" marker-end="url(#arr-l)"/>
    <text x="20" y="74" font-size="10" fill="#e85d32" font-weight="600">H</text>

    <!-- GL impede -->
    <text x="100" y="240" text-anchor="middle" font-size="10" fill="#1a2e3c">Impede:</text>
    <text x="100" y="254" text-anchor="middle" font-size="10" fill="#64748b">Translação X  ✗</text>
    <text x="100" y="268" text-anchor="middle" font-size="10" fill="#64748b">Translação Y  ✗</text>
    <text x="100" y="282" text-anchor="middle" font-size="10" fill="#94a3b8">Rotação Z  ✓</text>
  </g>

  <!-- ============ APOIO MÓVEL ============ -->
  <g transform="translate(300, 60)">
    <rect x="0" y="0" width="200" height="280" rx="8" fill="none" stroke="#e2e8f0" stroke-width="1.5"/>

    <text x="100" y="22" text-anchor="middle" font-size="13" font-weight="700" fill="#1a2e3c">Apoio Móvel</text>
    <text x="100" y="36" text-anchor="middle" font-size="9" fill="#94a3b8">1° G.L. / 1 reação</text>

    <!-- Viga -->
    <line x1="20" y1="80" x2="180" y2="80" stroke="#1a2e3c" stroke-width="4"/>

    <!-- Triângulo -->
    <polygon points="100,80 80,120 120,120" fill="#1a2e3c"/>

    <!-- Roldanas / cilindros -->
    <circle cx="90" cy="132" r="8" fill="none" stroke="#1a2e3c" stroke-width="2"/>
    <circle cx="110" cy="132" r="8" fill="none" stroke="#1a2e3c" stroke-width="2"/>
    <line x1="78" y1="142" x2="122" y2="142" stroke="#1a2e3c" stroke-width="2.5"/>

    <!-- Reação -->
    <line x1="100" y1="142" x2="100" y2="198" stroke="#e85d32" stroke-width="1.8" marker-end="url(#arr-u)"/>
    <text x="112" y="180" font-size="10" fill="#e85d32" font-weight="600">V</text>

    <!-- GL impede -->
    <text x="100" y="240" text-anchor="middle" font-size="10" fill="#1a2e3c">Impede:</text>
    <text x="100" y="254" text-anchor="middle" font-size="10" fill="#94a3b8">Translação X  ✓</text>
    <text x="100" y="268" text-anchor="middle" font-size="10" fill="#64748b">Translação Y  ✗</text>
    <text x="100" y="282" text-anchor="middle" font-size="10" fill="#94a3b8">Rotação Z  ✓</text>
  </g>

  <!-- ============ ENGASTE ============ -->
  <g transform="translate(560, 60)">
    <rect x="0" y="0" width="200" height="280" rx="8" fill="none" stroke="#e2e8f0" stroke-width="1.5"/>

    <text x="100" y="22" text-anchor="middle" font-size="13" font-weight="700" fill="#1a2e3c">Engaste</text>
    <text x="100" y="36" text-anchor="middle" font-size="9" fill="#94a3b8">3° G.L. / 3 reações</text>

    <!-- Viga -->
    <line x1="20" y1="80" x2="180" y2="80" stroke="#1a2e3c" stroke-width="4"/>

    <!-- Bloco do engaste -->
    <rect x="60" y="80" width="35" height="70" fill="#1a2e3c" rx="2"/>
    <!-- Hachuras do bloco -->
    <g stroke="#e2e8f0" stroke-width="0.8" opacity="0.5">
      <line x1="64" y1="85" x2="91" y2="85"/>
      <line x1="64" y1="90" x2="91" y2="90"/>
      <line x1="64" y1="95" x2="91" y2="95"/>
      <line x1="64" y1="100" x2="91" y2="100"/>
      <line x1="64" y1="105" x2="91" y2="105"/>
      <line x1="64" y1="110" x2="91" y2="110"/>
      <line x1="64" y1="115" x2="91" y2="115"/>
      <line x1="64" y1="120" x2="91" y2="120"/>
      <line x1="64" y1="125" x2="91" y2="125"/>
      <line x1="64" y1="130" x2="91" y2="130"/>
      <line x1="64" y1="135" x2="91" y2="135"/>
      <line x1="64" y1="140" x2="91" y2="140"/>
      <line x1="64" y1="145" x2="91" y2="145"/>
    </g>

    <!-- Reações -->
    <line x1="60" y1="105" x2="18" y2="105" stroke="#e85d32" stroke-width="1.8" marker-end="url(#arr-l)"/>
    <text x="28" y="98" font-size="10" fill="#e85d32" font-weight="600">H</text>

    <line x1="90" y1="150" x2="90" y2="198" stroke="#e85d32" stroke-width="1.8" marker-end="url(#arr-u)"/>
    <text x="100" y="182" font-size="10" fill="#e85d32" font-weight="600">V</text>

    <!-- Momento (seta circular) -->
    <path d="M 50,130 A 25,25 0 0,1 50,95" fill="none" stroke="#e85d32" stroke-width="1.8"/>
    <polygon points="50,93 54,100 46,100" fill="#e85d32"/>
    <text x="38" y="118" font-size="10" fill="#e85d32" font-weight="600">M</text>

    <!-- GL impede -->
    <text x="100" y="240" text-anchor="middle" font-size="10" fill="#1a2e3c">Impede:</text>
    <text x="100" y="254" text-anchor="middle" font-size="10" fill="#64748b">Translação X  ✗</text>
    <text x="100" y="268" text-anchor="middle" font-size="10" fill="#64748b">Translação Y  ✗</text>
    <text x="100" y="282" text-anchor="middle" font-size="10" fill="#64748b">Rotação Z  ✗</text>
  </g>

  <!-- Legenda rodapé -->
  <text x="400" y="330" text-anchor="middle" font-size="9" fill="#94a3b8">G.L. = Grau de Liberdade  |  ✗ = impedido  |  ✓ = livre</text>
</svg>
