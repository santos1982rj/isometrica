services:
  postgres:
    image: postgres:17
    container_name: isometrica-postgres
    environment:
      POSTGRES_USER: isometrica
      POSTGRES_PASSWORD: isometrica
      POSTGRES_DB: isometrica
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U isometrica"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    container_name: isometrica-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: isometrica-api
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://isometrica:isometrica@postgres:5432/isometrica
      REDIS_URL: redis://redis:6379
      PORT: "3001"
      JWT_SECRET: ${JWT_SECRET}
      CORS_ORIGIN: "http://localhost:3000"
      GROQ_API_KEY: ${GROQ_API_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  pgdata:
